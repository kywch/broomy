name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '20'
  PNPM_VERSION: '10'

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm check:all

  typecheck:
    name: Typecheck
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck

  unit-tests:
    name: Unit tests
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      # pnpm 10 skips electron's postinstall (pnpm-workspace.yaml only lists
      # node-pty under onlyBuiltDependencies), so the binary never downloads.
      # Unit tests transitively import 'electron', which needs dist/ + path.txt.
      - run: node node_modules/electron/install.js
      - run: pnpm test:unit

  e2e:
    name: E2E tests
    runs-on: ubuntu-22.04
    timeout-minutes: 30
    env:
      # Tells tests/electron-launch-args.ts to pass --no-sandbox --disable-gpu,
      # which Electron needs to run reliably on a headless CI runner.
      DOCKER: 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - name: Install Electron runtime libraries
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            xvfb \
            libgtk-3-0 \
            libgbm1 \
            libnss3 \
            libasound2 \
            libxss1 \
            libxtst6 \
            libx11-xcb1 \
            libdrm2 \
            libxcomposite1 \
            libxdamage1 \
            libxrandr2 \
            libatk1.0-0 \
            libatk-bridge2.0-0 \
            libcups2 \
            libpango-1.0-0 \
            libcairo2
      - run: pnpm install --frozen-lockfile
      # pnpm 10 skips electron's postinstall — see unit-tests job for context.
      # global-setup.ts would also download this, but doing it eagerly makes
      # failures easier to diagnose.
      - run: node node_modules/electron/install.js
      - name: Run E2E tests
        # --reporter=list streams per-test progress (config default 'html'
        # buffers everything, making hangs look identical to "still running").
        # --retries=0 overrides playwright.config.ts's CI retries=2 — on first
        # pass we want real failures, not 3x runtime amplification.
        # --max-failures=5 stops the suite once 5 tests fail, so a broken
        # baseline can't burn the whole time budget.
        # `timeout 20m` sends SIGTERM before the job timeout hits, giving
        # playwright a chance to write out a report.
        run: |
          timeout --signal=TERM --kill-after=30s 20m \
            xvfb-run --auto-servernum -- \
            npx playwright test --reporter=list --retries=0 --max-failures=5
      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/
          retention-days: 7
